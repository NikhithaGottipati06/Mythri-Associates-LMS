{% extends 'base.html' %}
{% block title %}Add New Loan{% endblock %}
{% block content %}
<div class="page-header">
  <i class="bi bi-cash-coin" style="font-size:20px;color:#1a3c6e;"></i>
  <h5>Add New Loan – Direct Disbursement</h5>
</div>
<div class="action-bar">
  <a href="{{ url_for('loan_disbursement_list') }}" class="btn btn-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i>Close</a>
</div>
<form method="POST">
  <div class="form-card">
    <div class="section-title">Loan Details</div>
    <div class="row g-3">
      <div class="col-md-5">
        <label class="form-label required">Member</label>
        <select name="member_id" class="form-select field-required" id="member_id" required onchange="fillMember(this.value)">
          <option value="">— Select Member —</option>
          {% for m in members %}
          <option value="{{ m.id }}">{{ m.member_code }} – {{ m.full_name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-4">
        <label class="form-label">Nominee</label>
        <input type="text" name="nominee_name" class="form-control" placeholder="Nominee name">
      </div>
      <div class="col-md-3">
        <label class="form-label">Monthly Net Income (₹)</label>
        <input type="number" name="monthly_net_income" id="monthly_net_income" class="form-control" step="0.01" value="0">
      </div>
      <div class="col-md-5">
        <label class="form-label required">Loan Type</label>
        <select name="loan_type_id" class="form-select field-required" id="loan_type_id" required onchange="fillLoanType(this.value)">
          <option value="">— Select Loan Type —</option>
          {% for lt in loan_types %}
          <option value="{{ lt.id }}">{{ lt.loan_type_name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-2">
        <label class="form-label">Tenure (Weeks)</label>
        <input type="number" name="tenure_weeks" id="tenure_weeks" class="form-control" readonly placeholder="Auto">
      </div>
      <div class="col-md-2">
        <label class="form-label">Interest Rate</label>
        <input type="text" id="interest_rate_display" class="form-control" readonly placeholder="—">
      </div>
      <div class="col-md-2">
        <label class="form-label">Loan Cycle #</label>
        <input type="number" name="loan_cycle" class="form-control" value="1" min="1">
      </div>
      <div class="col-md-3">
        <label class="form-label required">Amount (₹)</label>
        <input type="number" name="applied_amount" id="applied_amount" class="form-control field-required"
               step="0.01" required oninput="calcPreview()">
      </div>
      <div class="col-md-4">
        <label class="form-label required">Loan Purpose</label>
        <select name="purpose" class="form-select field-required" required>
          <option value="">— Select Purpose —</option>
          {% for p in loan_purposes %}
          <option value="{{ p }}">{{ p }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-3">
        <label class="form-label required">Disbursement Date</label>
        <input type="text" name="applied_date" class="form-control field-required"
               placeholder="DD/MM/YYYY" value="{{ today_str }}" required>
      </div>
    </div>

    <!-- EMI Preview -->
    <div id="emiPreview" style="display:none;" class="mt-3 p-3 rounded" style="background:#f0f4ff;">
      <div class="row g-2 text-center">
        <div class="col-md-3">
          <div class="fw-semibold text-muted" style="font-size:11px;">TOTAL INTEREST</div>
          <div class="fw-bold text-danger" id="prev_interest" style="font-size:16px;">₹0</div>
        </div>
        <div class="col-md-3">
          <div class="fw-semibold text-muted" style="font-size:11px;">TOTAL PAYABLE</div>
          <div class="fw-bold text-primary" id="prev_total" style="font-size:16px;">₹0</div>
        </div>
        <div class="col-md-3">
          <div class="fw-semibold text-muted" style="font-size:11px;">WEEKLY PRINCIPAL</div>
          <div class="fw-bold text-success" id="prev_principal" style="font-size:16px;">₹0</div>
        </div>
        <div class="col-md-3">
          <div class="fw-semibold text-muted" style="font-size:11px;">WEEKLY INSTALLMENT</div>
          <div class="fw-bold" id="prev_emi" style="font-size:16px;">₹0</div>
        </div>
      </div>
    </div>

    <div class="section-title mt-3">KYC Details</div>
    <div class="row g-3">
      <div class="col-md-3">
        <label class="form-label">Member KYC Type</label>
        <select name="member_kyc_type" id="member_kyc_type" class="form-select">
          <option value="">— Select —</option>
          {% for k in kyc_types %}
          <option value="{{ k }}">{{ k }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-3">
        <label class="form-label">Member KYC Number</label>
        <input type="text" name="member_kyc_number" id="member_kyc_number" class="form-control">
      </div>
      <div class="col-md-3">
        <label class="form-label">Nominee KYC Type</label>
        <select name="nominee_kyc_type" class="form-select">
          <option value="">— Select —</option>
          {% for k in kyc_types %}
          <option value="{{ k }}">{{ k }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-3">
        <label class="form-label">Nominee KYC Number</label>
        <input type="text" name="nominee_kyc_number" class="form-control">
      </div>
    </div>

    <div class="section-title mt-3">Disbursement Mode</div>
    <div class="row g-3">
      <div class="col-md-3">
        <label class="form-label">Mode</label>
        <select name="mode" class="form-select">
          <option>Cash</option><option>Bank Transfer</option><option>Cheque</option>
        </select>
      </div>
      <div class="col-md-3">
        <label class="form-label">Account No</label>
        <input type="text" name="account_no" class="form-control">
      </div>
      <div class="col-md-6">
        <label class="form-label">Remarks</label>
        <input type="text" name="remarks" class="form-control">
      </div>
    </div>
  </div>
  <div class="d-flex gap-2">
    <button type="submit" class="btn btn-success"><i class="bi bi-cash me-1"></i>Save and Disburse</button>
    <a href="{{ url_for('loan_disbursement_list') }}" class="btn btn-secondary">Cancel</a>
  </div>
</form>

<script>
const membersData = {{ members_json|safe }};
const loanTypesData = {{ loan_types_json|safe }};
let selectedLT = null;

function fillMember(mid) {
  const m = membersData.find(x => x.id == mid);
  if (!m) return;
  document.getElementById('monthly_net_income').value = m.income || 0;
  document.getElementById('member_kyc_type').value = m.kyc_type || '';
  document.getElementById('member_kyc_number').value = m.kyc_number || '';
}

function fillLoanType(lid) {
  selectedLT = loanTypesData.find(x => x.id == lid);
  if (!selectedLT) return;
  document.getElementById('tenure_weeks').value = selectedLT.tenure_weeks || '';
  const rateLabel = selectedLT.interest_type === 'Fixed'
    ? '₹' + selectedLT.interest_rate + ' (Fixed)'
    : selectedLT.interest_rate + '%';
  document.getElementById('interest_rate_display').value = rateLabel;
  calcPreview();
}

function calcPreview() {
  if (!selectedLT) return;
  const amount = parseFloat(document.getElementById('applied_amount').value) || 0;
  const tenure = parseInt(selectedLT.tenure_weeks) || 1;
  const rate = parseFloat(selectedLT.interest_rate) || 0;
  let totalInterest = selectedLT.interest_type === 'Fixed' ? rate : amount * rate / 100;
  const totalPayable = amount + totalInterest;
  const weeklyPrincipal = amount / tenure;
  const weeklyEMI = totalPayable / tenure;

  const fmt = v => '₹' + v.toLocaleString('en-IN', {maximumFractionDigits: 2});
  document.getElementById('prev_interest').textContent  = fmt(totalInterest);
  document.getElementById('prev_total').textContent     = fmt(totalPayable);
  document.getElementById('prev_principal').textContent = fmt(weeklyPrincipal);
  document.getElementById('prev_emi').textContent       = fmt(weeklyEMI);
  document.getElementById('emiPreview').style.display   = amount > 0 ? 'block' : 'none';
}
</script>
{% endblock %}
