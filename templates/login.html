<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login – Mythri LMS</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 180" style="height:100px;margin-bottom:6px;">
        <!-- Sun rays -->
        <g transform="translate(110,62)" stroke="#f59e0b" stroke-width="3" stroke-linecap="round">
          <line x1="0" y1="-38" x2="0" y2="-48"/>
          <line x1="13" y1="-35" x2="17" y2="-44" transform="rotate(25,0,0)"/>
          <line x1="0" y1="-38" x2="0" y2="-48" transform="rotate(50,0,0)"/>
          <line x1="0" y1="-38" x2="0" y2="-48" transform="rotate(75,0,0)"/>
          <line x1="0" y1="-38" x2="0" y2="-48" transform="rotate(100,0,0)"/>
          <line x1="0" y1="-38" x2="0" y2="-48" transform="rotate(130,0,0)"/>
          <line x1="0" y1="-38" x2="0" y2="-48" transform="rotate(155,0,0)"/>
          <line x1="0" y1="-38" x2="0" y2="-48" transform="rotate(180,0,0)"/>
          <line x1="0" y1="-38" x2="0" y2="-48" transform="rotate(205,0,0)"/>
          <line x1="0" y1="-38" x2="0" y2="-48" transform="rotate(230,0,0)"/>
          <line x1="0" y1="-38" x2="0" y2="-48" transform="rotate(255,0,0)"/>
          <line x1="0" y1="-38" x2="0" y2="-48" transform="rotate(280,0,0)"/>
        </g>
        <!-- Sun half-circle -->
        <path d="M80,62 A30,30 0 0,1 140,62 Z" fill="#f59e0b"/>
        <!-- House roof -->
        <polygon points="110,28 82,60 138,60" fill="#c47c1a"/>
        <!-- House window -->
        <rect x="104" y="46" width="12" height="12" rx="1" fill="#f59e0b" opacity="0.8"/>
        <line x1="110" y1="46" x2="110" y2="58" stroke="#c47c1a" stroke-width="1.5"/>
        <line x1="104" y1="52" x2="116" y2="52" stroke="#c47c1a" stroke-width="1.5"/>
        <!-- House walls stub -->
        <rect x="87" y="60" width="46" height="6" fill="#c47c1a"/>

        <!-- Left leaf -->
        <ellipse cx="55" cy="80" rx="22" ry="11" fill="#2d7a1f" transform="rotate(-40,55,80)"/>
        <ellipse cx="55" cy="80" rx="20" ry="9" fill="#3d9a2a" transform="rotate(-40,55,80)"/>
        <!-- Right leaf -->
        <ellipse cx="165" cy="80" rx="22" ry="11" fill="#2d7a1f" transform="rotate(40,165,80)"/>
        <ellipse cx="165" cy="80" rx="20" ry="9" fill="#3d9a2a" transform="rotate(40,165,80)"/>

        <!-- Blue right arc -->
        <path d="M165,80 Q185,120 140,148" stroke="#1a5cb3" stroke-width="14" fill="none" stroke-linecap="round"/>
        <!-- Green left arc -->
        <path d="M55,80 Q35,120 80,148" stroke="#3d9a2a" stroke-width="14" fill="none" stroke-linecap="round"/>

        <!-- Green hand (left) -->
        <path d="M80,148 Q95,160 110,155 Q115,140 105,130 Q95,120 82,125 Z" fill="#3d9a2a"/>
        <!-- Blue hand (right) -->
        <path d="M140,148 Q125,160 110,155 Q105,140 115,130 Q125,120 138,125 Z" fill="#1a5cb3"/>
        <!-- Handshake highlight -->
        <ellipse cx="110" cy="148" rx="12" ry="8" fill="white" opacity="0.3"/>

        <!-- Ground shadow lines -->
        <path d="M60,158 Q110,168 160,158" stroke="#2d5a1b" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.5"/>
      </svg>
      <h4>Mythri Associates LMS</h4>
      <p>Loan Monitoring System</p>
    </div>

    {% if error %}
    <div class="alert alert-danger py-2" style="font-size:13px;">
      <i class="bi bi-exclamation-circle me-1"></i> {{ error }}
    </div>
    {% endif %}

    <form method="POST">
      <div class="mb-3">
        <label class="form-label fw-semibold" style="font-size:13px;">Branch</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-diagram-3"></i></span>
          <select name="branch_id" class="form-select" required>
            <option value="">— Select Branch —</option>
            {% for b in branches %}
            <option value="{{ b.id }}">{{ b.name }}</option>
            {% endfor %}
          </select>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold" style="font-size:13px;">Login Name</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" name="login_name" class="form-control" placeholder="Enter login name" required autofocus>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold" style="font-size:13px;">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" name="password" id="pwd" class="form-control" placeholder="Enter password" required>
          <button type="button" class="btn btn-outline-secondary" onclick="togglePwd()">
            <i class="bi bi-eye" id="eyeIcon"></i>
          </button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100 fw-bold">
        <i class="bi bi-box-arrow-in-right me-1"></i> Login
      </button>
    </form>

  </div>
</div>
<script>
function togglePwd(){
  const p = document.getElementById('pwd');
  const i = document.getElementById('eyeIcon');
  if(p.type==='password'){ p.type='text'; i.className='bi bi-eye-slash'; }
  else { p.type='password'; i.className='bi bi-eye'; }
}
</script>
</body>
</html>
