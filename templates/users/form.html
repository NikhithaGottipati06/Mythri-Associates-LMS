{% extends 'base.html' %}
{% block title %}{{ 'Edit' if user else 'New' }} User{% endblock %}
{% block content %}
<div class="page-header">
  <i class="bi bi-person-plus" style="font-size:20px;color:#1a3c6e;"></i>
  <h5>{{ 'Edit User' if user else 'Add New User' }}</h5>
</div>

<div class="action-bar">
  <a href="{{ url_for('users_list') }}" class="btn btn-secondary btn-sm">
    <i class="bi bi-arrow-left me-1"></i>Close
  </a>
</div>

<form method="POST">
  <div class="form-card">
    <div class="section-title">User Details</div>
    <div class="row g-3">
      <div class="col-md-6">
        <label class="form-label required">Full Name</label>
        <input type="text" name="full_name" class="form-control field-required"
               value="{{ user.full_name if user else '' }}" required>
      </div>
      <div class="col-md-6">
        <label class="form-label required">Role</label>
        <select name="role" class="form-select field-required" required>
          <option value="">— Select Role —</option>
          <option value="Admin" {% if user and user.role=='Admin' %}selected{% endif %}>Admin</option>
          <option value="Staff" {% if user and user.role=='Staff' %}selected{% endif %}>Staff</option>
        </select>
      </div>
      <div class="col-md-4">
        <label class="form-label required">Joining Date</label>
        <input type="text" name="joining_date" class="form-control field-required"
               placeholder="DD/MM/YYYY" value="{{ user.joining_date if user else '' }}" required>
      </div>
      <div class="col-md-4">
        <label class="form-label required">Login Name</label>
        <input type="text" name="login_name" class="form-control field-required"
               value="{{ user.login_name if user else '' }}" required>
      </div>
      <div class="col-md-4">
        <label class="form-label">Email Address</label>
        <input type="email" name="email" class="form-control"
               value="{{ user.email if user else '' }}">
      </div>
      <div class="col-md-4">
        <label class="form-label {% if not user %}required{% endif %}">
          Login Password {% if user %}<small class="text-muted">(leave blank to keep)</small>{% endif %}
        </label>
        <input type="password" name="password" class="form-control {% if not user %}field-required{% endif %}"
               {% if not user %}required{% endif %} placeholder="Enter password">
      </div>
      <div class="col-md-4 d-flex align-items-end">
        <div class="form-check ms-2 mb-2">
          <input class="form-check-input" type="checkbox" name="active" id="active"
                 {% if not user or user.active %}checked{% endif %}>
          <label class="form-check-label fw-semibold" for="active">Active</label>
        </div>
      </div>
    </div>
  </div>

  <div class="d-flex gap-2">
    <button type="submit" class="btn btn-primary">
      <i class="bi bi-check2 me-1"></i>{{ 'Update' if user else 'Save' }}
    </button>
    <a href="{{ url_for('users_list') }}" class="btn btn-secondary">Cancel</a>
  </div>
</form>
{% endblock %}
